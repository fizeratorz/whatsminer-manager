version: '3.8'

services:
  whatsminer-manager:
    build: .
    container_name: whatsminer-manager
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_HASH=${ADMIN_HASH:-}
      - SECRET_KEY=${SECRET_KEY:-}
    volumes:
      - ./config:/app/config  # ← Конфиги сохраняются на хосте!
      - ./logs:/app/logs
    networks:
      - miners-net

networks:
  miners-net:
    driver: bridge
